# Host-side ports below (5433/6380/8002) are remapped off their defaults to
# avoid clashing with other stacks running locally. Containers talk to each
# other over the internal Docker network using the default ports/hostnames
# (postgres:5432, redis:6379) — see .env.example for both variants.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: prism
      POSTGRES_USER: ${POSTGRES_USER:-prism}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prism_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prism}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8002:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A src.api.worker.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-beat:
    build: .
    command: celery -A src.api.worker.celery_app beat --loglevel=info
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - redis

volumes:
  postgres_data:
